- name: Check wlan0 status
  ansible.builtin.command: "ip link show wlan0"
  register: wlan0_status
  changed_when: false
  tags: [wifi]

- name: Ensure wlan0 is up
  ansible.builtin.command: "ip link set wlan0 up"
  when: "'state DOWN' in wlan0_status.stdout"
  become: true
  tags: [wifi]

- name: Ensure WiFi interface is managed by NetworkManager
  command: nmcli device set wlan0 managed yes
  become: true
  tags: [wifi]

- name: Create or update WiFi connection
  community.general.nmcli:
    type: wifi
    conn_name: my-wifi
    ifname: wlan0
    ssid: "{{ TRNetwork.wifi_name }}"
    wifi_sec:
      key-mgmt: wpa-psk
      psk: "{{ TRNetwork.wifi_password }}"
    state: present
    autoconnect: true
  become: true
  tags: [wifi]

- name: Set WiFi band preference to 5GHz
  ansible.builtin.command: >
    nmcli connection modify my-wifi
    802-11-wireless.band {{ wifi_band }}
    802-11-wireless.bssid ""
  become: true
  changed_when: true
  tags: [wifi]

- name: Get currently active WiFi SSID
  ansible.builtin.shell: "nmcli -t -f active,ssid dev wifi | grep '^yes:' | cut -d: -f2"
  register: active_wifi_ssid
  changed_when: false
  failed_when: false
  become: true
  tags: [wifi]

- name: Ensure WiFi connection is active (only if not already on target SSID)
  command: nmcli connection up my-wifi
  become: true
  ignore_errors: true
  when: active_wifi_ssid.stdout != TRNetwork.wifi_name
  tags: [wifi]

- name: Check WiFi connection status
  command: nmcli device status
  register: wifi_status
  changed_when: false
  tags: [wifi]

- name: Display WiFi status
  debug:
    var: wifi_status.stdout_lines
  tags: [wifi]

- name: Deploy WiFi keepalive service
  ansible.builtin.copy:
    dest: /etc/systemd/system/wifi-keepalive.service
    content: |
      [Unit]
      Description=WiFi keepalive ping
      After=NetworkManager.service
      Wants=NetworkManager.service

      [Service]
      Type=oneshot
      ExecStart=/bin/ping -c 1 -W 2 -I wlan0 192.168.4.1
    owner: root
    group: root
    mode: "0644"
  become: true
  tags: [wifi]

- name: Deploy WiFi keepalive timer
  ansible.builtin.copy:
    dest: /etc/systemd/system/wifi-keepalive.timer
    content: |
      [Unit]
      Description=Ping gateway every 30s to prevent WiFi inactivity disconnect

      [Timer]
      OnBootSec=60
      OnUnitActiveSec=30

      [Install]
      WantedBy=timers.target
    owner: root
    group: root
    mode: "0644"
  become: true
  tags: [wifi]

- name: Enable and start WiFi keepalive timer
  ansible.builtin.systemd:
    name: wifi-keepalive.timer
    state: started
    enabled: true
    daemon_reload: true
  become: true
  tags: [wifi]