---
# Install Cargo
- name: check if cargo is installed
  shell: command -v cargo
  register: cargo_exists
  ignore_errors: true
  environment:
    PATH: "{{ home }}/.cargo/bin:{{ path }}"


- name: Download Installer
  when: cargo_exists is failed
  get_url:
    url: https://sh.rustup.rs
    dest: /tmp/sh.rustup.rs
    mode: '0755'
    force: 'yes'

- name: install rust/cargo
  shell: /tmp/sh.rustup.rs -y
  when: cargo_exists is failed

- name: Ensure swap is enabled before building Yazi
  ansible.builtin.include_tasks: "../../ubuntu/tasks/swap.yml"
  when: ansible_os_family != 'Darwin'
  tags: [swap, yazi]

- name: Check if yazi is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/yazi
  register: yazi_installed

- name: Clone Yazi repository
  ansible.builtin.git:
    repo: https://github.com/sxyazi/yazi.git
    dest: /opt/yazi-src
    update: yes
  become: true
  when: not yazi_installed.stat.exists

- name: Build Yazi from source
  ansible.builtin.command: cargo build --release --locked
  args:
    chdir: /opt/yazi-src
  environment:
    PATH: "{{ home }}/.cargo/bin:{{ path }}"
    # Limit parallelism to avoid OOM on low-RAM devices like Odroid/Pi
    CARGO_BUILD_JOBS: "2"
    RUSTFLAGS: "-C link-arg=-fuse-ld=lld"
  when: not yazi_installed.stat.exists

- name: Copy Yazi binaries to /usr/local/bin
  ansible.builtin.copy:
    src: "/opt/yazi-src/target/release/{{ item }}"
    dest: "/usr/local/bin/{{ item }}"
    mode: "0755"
    remote_src: yes
  loop:
    - yazi
    - ya
  become: true
  when: not yazi_installed.stat.exists

- name: Install navi if not installed
  community.general.cargo:
    name: "{{ item }}"
    locked: true
  environment:
    PATH: "{{ home }}/.cargo/bin:{{ path }}"
  loop:
    - navi

