---
- name: Check if Go is already installed
  command: /usr/local/go/bin/go version
  ignore_errors: true
  register: go_version_result
  changed_when: false
  become: true

- name: Remove current installation if outdated
  file:
    state: absent
    path: /usr/local/go
  when:
    - go_version_result is succeeded
    - go_version not in go_version_result.stdout
  become: true

- name: Download Go tarball
  get_url:
    url: "{{ go_download_url }}"
    dest: "/tmp/{{ go_tarball }}"
  when: go_version_result is failed
        or go_version not in go_version_result.stdout
  become: true

- name: Extract Go tarball
  unarchive:
    src: "/tmp/{{ go_tarball }}"
    dest: "/usr/local"
    remote_src: yes
  when: go_version_result is failed
        or go_version not in go_version_result.stdout
  become: true

# Packages that require go
- name: Check if duf is already installed
  ansible.builtin.stat:
    path: "{{ home }}/.local/bin/duf"
  register: duf_installed

- name: Download duf
  ansible.builtin.git:
    repo: "https://github.com/muesli/duf.git"
    dest: "/tmp/duf"
  when: not duf_installed.stat.exists
    
- name: Install duf
  ansible.builtin.command: go install
  args:
    chdir: /tmp/duf
  environment:
    PATH: "/usr/local/go/bin:{{ path }}"
  when: not duf_installed.stat.exists

# Packages that require go
- name: Check if cheat is already installed
  ansible.builtin.stat:
    path: "{{ home }}/.local/bin/cheat"
  register: cheat_installed

- name: Install cheat using go install
  ansible.builtin.command: /usr/local/go/bin/go install github.com/cheat/cheat/cmd/cheat@latest
  environment:
    PATH: "/usr/local/go/bin:{{ path }}"
  when: not cheat_installed.stat.exists

- name: Ensure cheat config directory exists
  ansible.builtin.file:
    path: "{{ home }}/.config/cheat/cheatsheets"
    state: directory
    mode: '0755'
    recurse: yes

- name: Check if community cheatsheets already exist
  ansible.builtin.stat:
    path: "{{ home }}/.config/cheat/cheatsheets/community"
  register: community_cheatsheets

- name: Clone community cheatsheets for cheat
  ansible.builtin.git:
    repo: "https://github.com/cheat/cheatsheets.git"
    dest: "{{ home }}/.config/cheat/cheatsheets/community"
    update: yes
  when: not community_cheatsheets.stat.exists or community_cheatsheets.stat.isdir
